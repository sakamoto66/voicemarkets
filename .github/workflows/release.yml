name: Release to Chrome Web Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish after upload (true = submit for review)'
        required: false
        default: 'true'

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build extension zip
        run: npm run build:zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voicemarkets-zip
          path: dist/voicemarkets.zip

      - name: Publish to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          SHOULD_PUBLISH: ${{ github.event.inputs.publish || 'true' }}
        run: |
          if [ "$SHOULD_PUBLISH" = "true" ]; then
            npx chrome-webstore-upload-cli@3 upload \
              --source dist/voicemarkets.zip \
              --extension-id "$EXTENSION_ID" \
              --client-id "$CLIENT_ID" \
              --client-secret "$CLIENT_SECRET" \
              --refresh-token "$REFRESH_TOKEN" \
              --auto-publish
          else
            npx chrome-webstore-upload-cli@3 upload \
              --source dist/voicemarkets.zip \
              --extension-id "$EXTENSION_ID" \
              --client-id "$CLIENT_ID" \
              --client-secret "$CLIENT_SECRET" \
              --refresh-token "$REFRESH_TOKEN"
          fi
