<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VoiceMarkets — Microphone Permission</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #ede9fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: #6c63ff;
    }
    h1 { font-size: 1.25rem; color: #111; margin-bottom: 8px; }
    p  { font-size: .9rem; color: #555; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #5a52d5; }
    button:disabled { background: #aaa; cursor: default; }
    .msg { margin-top: 20px; font-size: .875rem; min-height: 1.4em; }
    .msg.ok    { color: #16a34a; }
    .msg.error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.25 11a6.25 6.25 0 0 1-12.5 0H4a8 8 0 0 0 7 7.937V22h2v-2.063A8 8 0 0 0 20 12h-1.75z"/>
      </svg>
    </div>
    <h1 id="heading">Allow Microphone Access</h1>
    <p  id="body">VoiceMarkets needs your microphone to search by voice. Click the button below and then click <strong>Allow</strong> in the browser prompt.</p>
    <button id="grantBtn">Allow Microphone</button>
    <p class="msg" id="msg"></p>
  </div>
  <script src="permission.js"></script>
</body>
</html>
