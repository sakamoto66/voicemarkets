<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>VoiceMarkets</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.25 11a6.25 6.25 0 0 1-12.5 0H4a8 8 0 0 0 7 7.937V22h2v-2.063A8 8 0 0 0 20 12h-1.75z"/>
      </svg>
      <h1 class="title">VoiceMarkets</h1>
    </header>

    <main class="main">
      <button id="micBtn" class="mic-btn" aria-label="音声入力開始">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.25 11a6.25 6.25 0 0 1-12.5 0H4a8 8 0 0 0 7 7.937V22h2v-2.063A8 8 0 0 0 20 12h-1.75z"/>
        </svg>
      </button>
      <div class="status-row">
        <span id="spinner" class="spinner hidden" aria-hidden="true"></span>
        <p id="status" class="status">クリックして話す</p>
      </div>
      <input id="transcript" class="transcript" type="text" placeholder="認識結果を編集してEnterで再検索" aria-label="認識テキスト（編集可能）" />
    </main>

    <!-- Filters: period + source -->
    <div class="filters">
      <div class="filter-row">
        <span class="filter-label">期間</span>
        <div class="period-pills" role="group" aria-label="期間フィルター">
          <button class="period-pill active" data-period="all">全期間</button>
          <button class="period-pill" data-period="1h">1時間</button>
          <button class="period-pill" data-period="24h">24時間</button>
          <button class="period-pill" data-period="1w">1週間</button>
          <button class="period-pill" data-period="1m">1ヶ月</button>
          <button class="period-pill" data-period="1y">1年</button>
        </div>
      </div>
      <div class="filter-row">
        <span class="filter-label">検索先</span>
        <div class="source-toggles" role="group" aria-label="検索先の選択">
          <button class="source-toggle active" data-source="bookmarks" aria-pressed="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="12" height="12" aria-hidden="true">
              <path d="M17 3H7a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2z"/>
            </svg>
            ブックマーク
          </button>
          <button class="source-toggle active" data-source="history" aria-pressed="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="12" height="12" aria-hidden="true">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 5v5.25l4.5 2.67-.75 1.23L11 13V7h1.5z"/>
            </svg>
            履歴
          </button>
        </div>
      </div>
    </div>

    <p id="ranking-info" class="ranking-info hidden"></p>
    <ul id="results" class="results hidden" role="list"></ul>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
