<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>VoiceMarkets</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.25 11a6.25 6.25 0 0 1-12.5 0H4a8 8 0 0 0 7 7.937V22h2v-2.063A8 8 0 0 0 20 12h-1.75z"/>
      </svg>
      <h1 class="title">VoiceMarkets</h1>
    </header>

    <main class="main">
      <button id="micBtn" class="mic-btn" data-i18n-aria="mic_btn_label">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.25 11a6.25 6.25 0 0 1-12.5 0H4a8 8 0 0 0 7 7.937V22h2v-2.063A8 8 0 0 0 20 12h-1.75z"/>
        </svg>
      </button>
      <div class="status-row">
        <span id="spinner" class="spinner hidden" aria-hidden="true"></span>
        <p id="status" class="status" data-i18n="status_idle"></p>
      </div>
      <input id="transcript" class="transcript" type="text"
             data-i18n-placeholder="transcript_placeholder"
             data-i18n-aria="transcript_aria_label" />
    </main>

    <!-- Filters: period + source -->
    <div class="filters">
      <div class="filter-row">
        <span class="filter-label" data-i18n="filter_period_label"></span>
        <div class="period-pills" role="group" data-i18n-aria="period_filter_aria">
          <button class="period-pill active" data-period="all"  data-i18n="period_all"></button>
          <button class="period-pill"        data-period="1h"   data-i18n="period_1h"></button>
          <button class="period-pill"        data-period="24h"  data-i18n="period_24h"></button>
          <button class="period-pill"        data-period="1w"   data-i18n="period_1w"></button>
          <button class="period-pill"        data-period="1m"   data-i18n="period_1m"></button>
          <button class="period-pill"        data-period="1y"   data-i18n="period_1y"></button>
        </div>
      </div>
      <div class="filter-row">
        <span class="filter-label" data-i18n="filter_source_label"></span>
        <div class="source-toggles" role="group" data-i18n-aria="source_filter_aria">
          <button class="source-toggle active" data-source="bookmarks" aria-pressed="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="12" height="12" aria-hidden="true">
              <path d="M17 3H7a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2z"/>
            </svg>
            <span data-i18n="source_bookmarks"></span>
          </button>
          <button class="source-toggle active" data-source="history" aria-pressed="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="12" height="12" aria-hidden="true">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 5v5.25l4.5 2.67-.75 1.23L11 13V7h1.5z"/>
            </svg>
            <span data-i18n="source_history"></span>
          </button>
        </div>
      </div>
    </div>

    <p id="ranking-info" class="ranking-info hidden"></p>
    <ul id="results" class="results hidden" role="list"></ul>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
